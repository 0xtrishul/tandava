<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>tandava — trishul</title>
<meta name="description" content="high-bpm ritual selection · the beat moves the still centre" />
<link rel="preload" href="./assets/fonts/JetBrainsMono-400.woff2" as="font" type="font/woff2" crossorigin />
<link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <main class="terminal" role="application" aria-label="tandava audio player">
    <div class="bar">
      <span class="dot red"></span><span class="dot"></span><span class="dot"></span>
      <span class="path">trishul@tandava:<b>~/ritual</b></span>
    </div>

    <div class="body">
      <div class="prompt"><span class="u">trishul</span>@re<span class="c">:~$</span> ./tandava --play<span class="caret"></span></div>
      <div class="tag">॥ the beat moves the still centre ॥ · high-bpm ritual selection</div>

      <div class="stage">
        <canvas id="viz" width="480" height="480" aria-hidden="true"></canvas>
        <span class="glyph">ॐ</span>
      </div>

      <div class="now" aria-live="polite">
        <div class="idle" id="idle">— select a track to begin —</div>
        <div id="np" hidden>
          <div class="title" id="npTitle"></div>
          <div class="artist" id="npArtist"></div>
        </div>
      </div>

      <div class="seek">
        <span class="t" id="cur">0:00</span>
        <div class="track" id="track" role="slider" aria-label="seek" tabindex="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="fill" id="fill"></div>
          <div class="knob" id="knob"></div>
        </div>
        <span class="t r" id="dur">0:00</span>
      </div>

      <div class="controls">
        <button class="ctl" id="prev" aria-label="previous track">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L18 6v12z"/></svg>
        </button>
        <button class="ctl play" id="play" aria-label="play">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctl" id="next" aria-label="next track">
          <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
        </button>
      </div>

      <div class="vol">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9zm13.5 3c0-1.8-1-3.3-2.5-4v8c1.5-.7 2.5-2.2 2.5-4z"/></svg>
        <input type="range" id="vol" min="0" max="100" value="80" aria-label="volume" />
      </div>

      <div class="list">
        <div class="head"><span>selection</span><span>bpm</span></div>
        <div id="rows"></div>
      </div>

      <div class="credit" id="credit"></div>
    </div>
  </main>

  <script src="./assets/config.js" defer></script>
</body>
</html>
